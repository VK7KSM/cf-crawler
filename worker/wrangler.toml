name = "cf-crawler-worker"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

[vars]
CF_CRAWLER_VERSION = "0.2.0"

[browser]
binding = "BROWSER"

