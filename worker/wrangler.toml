name = "cf-crawler-worker"
main = "src/index.ts"
compatibility_date = "2026-03-06"

[vars]
CF_CRAWLER_VERSION = "0.1.0"

# Optional: set browser rendering REST API endpoint if you do not use direct browser bindings.
# BROWSER_RENDERING_API_URL = "https://api.cloudflare.com/client/v4/accounts/<account_id>/browser-rendering/markdown"

# Optional: KV cache for low-cost dedupe/result caching.
# [[kv_namespaces]]
# binding = "CRAWLER_CACHE"
# id = "<kv_namespace_id>"
