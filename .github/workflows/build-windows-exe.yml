name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build CLI
        run: npm run build

      - name: Build Worker
        run: npm run build:worker

      - name: Build Windows executable
        run: npm run build:exe

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-crawler-win-x64
          path: release/cf-crawler-win-x64.exe
          if-no-files-found: error

