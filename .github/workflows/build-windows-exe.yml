name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build CLI
        run: npm run build

      - name: Build Worker
        run: npm run build:worker

      - name: Build Windows executable
        run: npm run build:exe

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-crawler-win-x64
          path: release/cf-crawler-win-x64.exe
          if-no-files-found: error

      - name: Publish latest release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = 'latest'
          $name = 'Latest build'
          $notes = @"
          Auto-updated build from branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          "@

          gh release view $tag --repo ${{ github.repository }} *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag release/cf-crawler-win-x64.exe --clobber --repo ${{ github.repository }}
            gh release edit $tag --title $name --notes $notes --repo ${{ github.repository }}
          } else {
            gh release create $tag release/cf-crawler-win-x64.exe --title $name --notes $notes --latest --repo ${{ github.repository }}
          }

      - name: Publish version release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $name = $tag
          $notes = @"
          Version release $tag
          Commit: ${{ github.sha }}
          "@

          gh release view $tag --repo ${{ github.repository }} *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag release/cf-crawler-win-x64.exe --clobber --repo ${{ github.repository }}
            gh release edit $tag --title $name --notes $notes --repo ${{ github.repository }}
          } else {
            gh release create $tag release/cf-crawler-win-x64.exe --title $name --notes $notes --repo ${{ github.repository }}
          }
